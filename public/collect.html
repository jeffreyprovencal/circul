<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log a Collection — Circul</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep:       #1a2e1a;
      --forest:     #2d6a4f;
      --mint:       #a7f3d0;
      --light-mint: #f0fdf4;
      --white:      #ffffff;
      --bg:         #f3f6f3;
      --text:       #1a2e1a;
      --muted:      #6b7280;
      --border:     #e5e7eb;
      --radius:     16px;
      --radius-sm:  10px;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── same as collector-dashboard */
    .header { background: var(--deep); }

    .header-inner {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 24px 28px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .brand {
      font-size: 1rem;
      font-weight: 800;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .header-back {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.15s;
    }
    .header-back:hover { color: var(--white); }

    .header-title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.8px;
      line-height: 1.1;
    }

    .header-sub {
      font-size: 0.86rem;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
    }

    /* ── MAIN ── */
    .main {
      max-width: 640px;
      margin: 0 auto;
      padding: 28px 24px 64px;
    }

    /* ── CARD ── */
    .form-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .form-card-body { padding: 28px 24px; }

    /* ── FORM ── */
    .form-group { margin-bottom: 22px; }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-label .optional {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.78rem;
    }

    .form-select,
    .form-input,
    .form-textarea {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.15s;
      outline: none;
      -webkit-appearance: none;
    }
    .form-select:focus,
    .form-input:focus,
    .form-textarea:focus { border-color: var(--forest); box-shadow: 0 0 0 3px rgba(45,106,79,0.08); }

    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    /* ── SUBMIT ── */
    .btn-submit {
      width: 100%;
      padding: 15px 28px;
      background: var(--mint);
      color: var(--deep);
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-submit:hover:not(:disabled) { background: #86efcc; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── ERROR ── */
    .error-msg {
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-sm);
      color: #dc2626;
      font-size: 0.875rem;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── LOADING ── */
    .loading-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── SUCCESS ── */
    .success-state {
      text-align: center;
      padding: 48px 24px;
      display: none;
    }
    .success-state.visible { display: block; }

    .success-icon { font-size: 2.8rem; margin-bottom: 16px; }

    .success-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--deep);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 24px;
      background: transparent;
      border: 1.5px solid var(--forest);
      color: var(--forest);
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      transition: background 0.15s, color 0.15s;
    }
    .btn-back:hover { background: var(--forest); color: var(--white); }

    /* ── LOG ANOTHER ── */
    .btn-log-another {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: var(--mint);
      color: var(--deep);
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      margin-right: 12px;
      margin-bottom: 12px;
      transition: background 0.15s;
    }
    .btn-log-another:hover { background: #86efcc; }

    @media (max-width: 480px) {
      .header-inner { padding: 18px 16px 24px; }
      .main         { padding: 20px 16px 52px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-top">
        <a href="/" class="brand">♻ Circul</a>
        <a href="/collector-dashboard.html" class="header-back">← Dashboard</a>
      </div>
      <div class="header-title">Log a Collection</div>
      <div class="header-sub" id="collectorSub">Loading…</div>
    </div>
  </header>

  <main class="main">
    <div class="form-card">

      <!-- Loading -->
      <div class="loading-state" id="loadingState">Loading your account…</div>

      <!-- Form -->
      <div class="form-card-body" id="formBody" style="display:none">
        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
          <label class="form-label" for="materialSelect">Material type</label>
          <select class="form-select" id="materialSelect">
            <option value="">Select material…</option>
            <option value="PET">PET Plastic</option>
            <option value="HDPE">HDPE Plastic</option>
            <option value="LDPE">LDPE Plastic</option>
            <option value="PP">PP Plastic</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="weightInput">Quantity (kg)</label>
          <input type="number" class="form-input" id="weightInput"
                 placeholder="0.0" min="0.1" step="0.1" inputmode="decimal">
        </div>

        <div class="form-group">
          <label class="form-label" for="notesInput">
            Notes <span class="optional">(optional)</span>
          </label>
          <textarea class="form-textarea" id="notesInput"
                    placeholder="Any notes about this collection…"></textarea>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submitCollection()">
          Log Collection
        </button>
      </div>

      <!-- Success -->
      <div class="success-state" id="successState">
        <div class="success-icon">✅</div>
        <div class="success-title">Collection logged ✓</div>
        <div class="success-sub" id="successSub">Your collection has been recorded.</div>
        <div>
          <button class="btn-log-another" onclick="resetForm()">+ Log another</button>
          <a href="/collector-dashboard.html" class="btn-back">← Back to dashboard</a>
        </div>
      </div>

    </div>
  </main>

  <script>
    var session     = null;
    var collectorId = null; // resolved collectors.id from /api/collectors?phone=

    /* ── AUTH GATE ─────────────────────────────── */
    (function () {
      try { session = JSON.parse(localStorage.getItem('circul_operator')); } catch (e) {}

      if (!session || session.role !== 'collector') {
        window.location.replace('/login.html');
        return;
      }

      // Hydrate header from session immediately
      document.getElementById('collectorSub').textContent = session.name || session.phone || '';

      // Resolve the collector's collectors.id (different from operators.id / session.id)
      resolveCollectorId();
    })();

    /* ── RESOLVE COLLECTOR ID ───────────────────── */
    function resolveCollectorId() {
      if (!session || !session.phone) {
        showError('Could not identify your account. Please sign in again.');
        document.getElementById('loadingState').style.display = 'none';
        return;
      }

      fetch('/api/collectors?phone=' + encodeURIComponent(session.phone))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var row = data && data.collectors && data.collectors[0];
          if (!row) {
            document.getElementById('loadingState').textContent =
              'No collector record found for this account. Please contact support.';
            return;
          }
          collectorId = row.id;
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('formBody').style.display = 'block';
        })
        .catch(function () {
          document.getElementById('loadingState').textContent =
            'Failed to load account. Check your connection and refresh.';
        });
    }

    /* ── SUBMIT COLLECTION ──────────────────────── */
    function submitCollection() {
      var material = document.getElementById('materialSelect').value;
      var weight   = parseFloat(document.getElementById('weightInput').value);
      var notes    = document.getElementById('notesInput').value.trim();

      if (!material) { showError('Please select a material type.'); return; }
      if (!weight || weight <= 0) { showError('Please enter a valid weight greater than 0 kg.'); return; }
      if (!collectorId) { showError('Account not ready — please wait or refresh.'); return; }

      hideError();
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Logging…';

      var payload = {
        collector_id:     collectorId,
        material_type:    material,
        gross_weight_kg:  weight,
        net_weight_kg:    weight,
        price_per_kg:     0,
        total_price:      0,
        payment_status:   'unpaid'
      };
      if (notes) payload.notes = notes;

      fetch('/api/transactions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.success) {
            var net = parseFloat(data.transaction && data.transaction.net_weight_kg) || weight;
            document.getElementById('successSub').textContent =
              net.toFixed(1) + ' kg of ' + material + ' Plastic recorded.';
            document.getElementById('formBody').style.display = 'none';
            document.getElementById('successState').classList.add('visible');
          } else {
            showError(data.message || 'Failed to log collection. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Log Collection';
          }
        })
        .catch(function () {
          showError('Connection error. Please check your internet and try again.');
          btn.disabled = false;
          btn.textContent = 'Log Collection';
        });
    }

    /* ── RESET (log another) ─────────────────────── */
    function resetForm() {
      document.getElementById('materialSelect').value = '';
      document.getElementById('weightInput').value = '';
      document.getElementById('notesInput').value = '';
      document.getElementById('successState').classList.remove('visible');
      document.getElementById('formBody').style.display = 'block';
      hideError();
    }

    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }
  </script>

</body>
</html>
