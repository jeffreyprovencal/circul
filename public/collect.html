<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log a Sale — Circul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep:       #1a2e1a;
      --forest:     #2d6a4f;
      --mint:       #a7f3d0;
      --light-mint: #f0fdf4;
      --white:      #ffffff;
      --bg:         #f3f6f3;
      --text:       #1a2e1a;
      --muted:      #6b7280;
      --border:     #e5e7eb;
      --radius:     16px;
      --radius-sm:  10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; }

    /* ── HEADER ── */
    .header { background: var(--deep); }

    .header-inner {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 24px 28px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .brand {
      font-size: 1rem;
      font-weight: 800;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .header-back {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.15s;
    }
    .header-back:hover { color: var(--white); }

    .header-title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.8px;
      line-height: 1.1;
    }

    .header-sub {
      font-size: 0.86rem;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
    }

    /* ── MAIN ── */
    .main {
      max-width: 640px;
      margin: 0 auto;
      padding: 28px 24px 64px;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .form-card-body { padding: 28px 24px; }

    /* ── FORM ── */
    .form-group { margin-bottom: 22px; }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-label .optional {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.78rem;
    }

    .form-select,
    .form-input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.15s;
      outline: none;
      -webkit-appearance: none;
    }
    .form-select:focus,
    .form-input:focus { border-color: var(--forest); box-shadow: 0 0 0 3px rgba(45,106,79,0.08); }

    /* ── SUBMIT ── */
    .btn-submit {
      width: 100%;
      padding: 15px 28px;
      background: var(--mint);
      color: var(--deep);
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-submit:hover:not(:disabled) { background: #86efcc; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── ERROR ── */
    .error-msg {
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-sm);
      color: #dc2626;
      font-size: 0.875rem;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── LOADING ── */
    .loading-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── SUCCESS ── */
    .success-state {
      text-align: center;
      padding: 48px 24px;
      display: none;
    }
    .success-state.visible { display: block; }

    .success-icon { font-size: 2.8rem; margin-bottom: 16px; }

    .success-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--deep);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 24px;
      background: transparent;
      border: 1.5px solid var(--forest);
      color: var(--forest);
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      transition: background 0.15s, color 0.15s;
    }
    .btn-back:hover { background: var(--forest); color: var(--white); }

    .btn-log-another {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: var(--mint);
      color: var(--deep);
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      margin-right: 12px;
      margin-bottom: 12px;
      transition: background 0.15s;
    }
    .btn-log-another:hover { background: #86efcc; }

    /* ── PENDING CARD ── */
    .pending-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .pending-card-header {
      padding: 16px 24px;
      background: var(--deep);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--mint);
      letter-spacing: 0.3px;
    }

    .pending-card-body { padding: 0; }

    .pending-empty {
      padding: 28px 24px;
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .pending-row {
      display: grid;
      grid-template-columns: 80px 60px 70px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .pending-row:last-child { border-bottom: none; }

    .pending-row-date  { color: var(--muted); font-size: 0.78rem; }
    .pending-row-mat   { font-weight: 700; color: var(--forest); }
    .pending-row-kg    { color: var(--text); }
    .pending-row-agg   { color: var(--muted); font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .badge-pending   { background: #fef9c3; color: #854d0e; }
    .badge-confirmed { background: #dcfce7; color: #166534; }
    .badge-rejected  { background: #fee2e2; color: #991b1b; }
    .badge-cancelled { background: #f3f4f6; color: #4b5563; }

    /* ── MY SALES CARD ── */
    .my-sales-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-top: 24px;
    }

    .my-sales-header {
      padding: 14px 24px;
      background: var(--deep);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--mint);
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .my-sales-header-refresh {
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(167,243,208,0.7);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }
    .my-sales-header-refresh:hover { color: var(--mint); }

    .sale-item {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }
    .sale-item:last-child { border-bottom: none; }

    .sale-top {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 6px;
    }

    .sale-mat {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--forest);
    }

    .sale-weight {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 600;
    }

    .sale-price-ask {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .sale-agg {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .sale-time {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .sale-status-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .sale-total {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--deep);
      margin-left: auto;
    }

    .sale-final-price {
      font-size: 0.8rem;
      color: var(--forest);
      font-weight: 600;
      margin-top: 5px;
    }

    .sale-final-note {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .sale-reject-reason {
      font-size: 0.8rem;
      color: #dc2626;
      margin-top: 5px;
      line-height: 1.4;
    }

    .badge-confirmed  { background: #dcfce7; color: #166534; }
    .badge-completed  { background: #dcfce7; color: #166534; }
    .badge-grade-a    { background: #dcfce7; color: #166534; }
    .badge-grade-b    { background: #dbeafe; color: #1e40af; }
    .badge-grade-c    { background: #fef9c3; color: #854d0e; }

    .sales-empty {
      padding: 28px 24px;
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .header-inner { padding: 18px 16px 24px; }
      .main         { padding: 20px 16px 52px; }
      .pending-row  { grid-template-columns: 70px 52px 60px 1fr auto; gap: 8px; padding: 12px 16px; }
      .form-card-body { padding: 24px 16px; }
      .sale-item { padding: 14px 16px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-top">
        <a href="/" class="brand">♻ Circul</a>
        <a href="/collector-dashboard" class="header-back">← Dashboard</a>
      </div>
      <div class="header-title">Log a Sale</div>
      <div class="header-sub" id="collectorSub">Loading…</div>
    </div>
  </header>

  <main class="main">

    <!-- ── FORM CARD ── -->
    <div class="form-card">

      <!-- Loading -->
      <div class="loading-state" id="loadingState">Loading your account…</div>

      <!-- Form -->
      <div class="form-card-body" id="formBody" style="display:none">
        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
          <label class="form-label" for="materialSelect">Material type</label>
          <select class="form-select" id="materialSelect">
            <option value="">Select material…</option>
            <option value="PET">PET Plastic</option>
            <option value="HDPE">HDPE Plastic</option>
            <option value="LDPE">LDPE Plastic</option>
            <option value="PP">PP Plastic</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="weightInput">Weight (kg)</label>
          <input type="number" class="form-input" id="weightInput"
                 placeholder="0.0" min="0.1" max="500" step="0.1" inputmode="decimal">
        </div>

        <div class="form-group">
          <label class="form-label" for="aggregatorSelect">Aggregator</label>
          <select class="form-select" id="aggregatorSelect">
            <option value="">Loading aggregators…</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="priceInput">
            Price (GH₵/kg) <span class="optional">(optional — leave blank to use posted price)</span>
          </label>
          <input type="number" class="form-input" id="priceInput"
                 placeholder="Leave blank to use posted price" min="0" step="0.01" inputmode="decimal">
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submitSale()">
          Log Sale
        </button>
      </div>

      <!-- Success -->
      <div class="success-state" id="successState">
        <div class="success-icon">✅</div>
        <div class="success-title">Sale logged ✓</div>
        <div class="success-sub" id="successSub">Sale logged — waiting for aggregator to confirm.</div>
        <div>
          <button class="btn-log-another" onclick="resetForm()">+ Log another</button>
          <a href="/collector-dashboard" class="btn-back">← Back to dashboard</a>
        </div>
      </div>

    </div>

    <!-- ── MY SALES ── -->
    <div class="my-sales-card" id="mySalesCard" style="display:none">
      <div class="my-sales-header">
        📋 My Sales
        <button class="my-sales-header-refresh" onclick="loadMySales()">↻ Refresh</button>
      </div>
      <div id="mySalesList">
        <div class="sales-empty">Loading…</div>
      </div>
    </div>

  </main>

  <script>
    var session     = null;
    var collectorId = null; // resolved collectors.id

    /* ── AUTH GATE ─────────────────────────────── */
    (function () {
      try { session = JSON.parse(localStorage.getItem('circul_user')); } catch (e) {}
      if (!session || session.role !== 'collector') {
        window.location.replace('/login.html');
        return;
      }
      document.getElementById('collectorSub').textContent = session.name || session.phone || '';
      resolveCollectorId();
    })();

    /* ── RESOLVE COLLECTOR ID ───────────────────── */
    function resolveCollectorId() {
      if (!session || !session.phone) {
        document.getElementById('loadingState').textContent =
          'Could not identify your account. Please sign in again.';
        return;
      }

      fetch('/api/collectors?phone=' + encodeURIComponent(session.phone))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var row = data && data.collectors && data.collectors[0];
          if (!row) {
            document.getElementById('loadingState').textContent =
              'No collector record found for this account. Please contact support.';
            return;
          }
          collectorId = row.id;
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('formBody').style.display = 'block';
          loadAggregators();
          loadMySales();
        })
        .catch(function () {
          document.getElementById('loadingState').textContent =
            'Failed to load account. Check your connection and refresh.';
        });
    }

    /* ── LOAD AGGREGATORS ───────────────────────── */
    function loadAggregators() {
      fetch('/api/aggregators')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var sel = document.getElementById('aggregatorSelect');
          var aggs = data.aggregators || [];
          if (!aggs.length) {
            sel.innerHTML = '<option value="">No aggregators available</option>';
            return;
          }
          sel.innerHTML = '<option value="">Select aggregator…</option>' +
            aggs.map(function (a) {
              var label = 'AGG-' + String(a.id).padStart(5, '0') + ' — ' + (a.name || a.company || ('Aggregator #' + a.id));
              if (a.city) label += ' — ' + a.city;
              return '<option value="' + a.id + '">' + label + '</option>';
            }).join('');
        })
        .catch(function () {
          document.getElementById('aggregatorSelect').innerHTML =
            '<option value="">Failed to load aggregators</option>';
        });
    }

    /* ── SUBMIT SALE ────────────────────────────── */
    function submitSale() {
      var material  = document.getElementById('materialSelect').value;
      var weight    = parseFloat(document.getElementById('weightInput').value);
      var aggId     = parseInt(document.getElementById('aggregatorSelect').value, 10);
      var priceVal  = document.getElementById('priceInput').value.trim();
      var price     = priceVal !== '' ? parseFloat(priceVal) : null;

      if (!material)           { showError('Please select a material type.'); return; }
      if (!weight || weight <= 0) { showError('Please enter a valid weight greater than 0 kg.'); return; }
      if (weight > 500)        { showError('Maximum weight per sale is 500 kg.'); return; }
      if (!aggId)              { showError('Please select an aggregator.'); return; }
      if (!collectorId)        { showError('Account not ready — please wait or refresh.'); return; }

      hideError();
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Logging…';

      var payload = {
        transaction_type:       'collector_sale',
        collector_id:           collectorId,
        aggregator_id: aggId,
        material_type:          material,
        gross_weight_kg:        weight
      };
      if (price !== null && !isNaN(price)) payload.price_per_kg = price;

      fetch('/api/pending-transactions', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.success) {
            var pt = data.pending_transaction;
            var kg = parseFloat(pt.gross_weight_kg).toFixed(1);
            document.getElementById('successSub').textContent =
              kg + ' kg of ' + pt.material_type + ' logged — waiting for aggregator to confirm.';
            document.getElementById('formBody').style.display = 'none';
            document.getElementById('successState').classList.add('visible');
            loadMySales();
          } else {
            showError(data.message || 'Failed to log sale. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Log Sale';
          }
        })
        .catch(function () {
          showError('Connection error. Please check your internet and try again.');
          btn.disabled = false;
          btn.textContent = 'Log Sale';
        });
    }

    /* ── LOAD MY SALES ───────────────────────────── */
    function loadMySales() {
      if (!collectorId) return;
      var card = document.getElementById('mySalesCard');
      var list = document.getElementById('mySalesList');

      fetch('/api/pending-transactions/collector-sales?collector_id=' + collectorId)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var rows = data.pending_transactions || [];
          card.style.display = '';
          if (!rows.length) {
            list.innerHTML = '<div class="sales-empty">No sales logged yet.</div>';
            return;
          }
          list.innerHTML = rows.map(renderSaleItem).join('');
        })
        .catch(function () {
          card.style.display = '';
          list.innerHTML = '<div class="sales-empty">Could not load sales.</div>';
        });
    }

    function renderSaleItem(pt) {
      var status    = pt.status || 'pending';
      var kg        = parseFloat(pt.gross_weight_kg);
      var aggName   = esc(pt.aggregator_name || pt.aggregator_company || '—');
      var priceAsk  = pt.price_per_kg ? 'GH₵ ' + parseFloat(pt.price_per_kg).toFixed(2) + '/kg' : 'Price TBD';
      var submitted = timeAgo(pt.created_at);

      // Status badge + label
      var badgeHtml, extraHtml = '';
      if (status === 'pending') {
        badgeHtml = '<span class="badge badge-pending">Awaiting Aggregator</span>';
      } else if (status === 'confirmed') {
        badgeHtml = '<span class="badge badge-confirmed">Accepted</span>';
        // Grade badge
        var grade = pt.grade || '';
        if (grade) {
          var gradeClass = grade === 'A' ? 'badge-grade-a' : grade === 'B' ? 'badge-grade-b' : 'badge-grade-c';
          badgeHtml += ' <span class="badge ' + gradeClass + '">Grade ' + esc(grade) + '</span>';
        }
        // Final price from transaction JOIN
        var finalPrice  = parseFloat(pt.final_price_per_kg || pt.price_per_kg || 0);
        var finalTotal  = parseFloat(pt.final_total_price  || (finalPrice * kg) || 0);
        var priceNote   = grade === 'A' ? '<div class="sale-final-note">(+10% premium applied)</div>' : '';
        extraHtml = '<div class="sale-final-price">Final price: GH₵ ' + finalPrice.toFixed(2) + ' × ' + kg.toFixed(1) + ' kg = GH₵ ' + finalTotal.toFixed(2) + '</div>' + priceNote;
      } else if (status === 'rejected') {
        badgeHtml = '<span class="badge badge-rejected">Rejected</span>';
        if (pt.rejection_reason) {
          extraHtml = '<div class="sale-reject-reason">✗ ' + esc(pt.rejection_reason) + '</div>';
        }
      } else if (status === 'completed') {
        badgeHtml = '<span class="badge badge-completed">Completed</span>';
      } else {
        badgeHtml = '<span class="badge badge-pending">' + esc(status) + '</span>';
      }

      // Total line: use final if confirmed, else original or TBD
      var totalGhs = '';
      if (status === 'confirmed' && pt.final_total_price) {
        totalGhs = 'GH₵ ' + parseFloat(pt.final_total_price).toFixed(2);
      } else if (pt.total_price) {
        totalGhs = 'GH₵ ' + parseFloat(pt.total_price).toFixed(2);
      } else if (pt.price_per_kg) {
        totalGhs = 'GH₵ ' + (parseFloat(pt.price_per_kg) * kg).toFixed(2);
      }

      return '<div class="sale-item">' +
        '<div class="sale-top">' +
          '<span class="sale-mat">' + esc(pt.material_type) + '</span>' +
          '<span class="sale-weight">' + kg.toFixed(1) + ' kg</span>' +
          '<span class="sale-price-ask">' + priceAsk + '</span>' +
        '</div>' +
        '<div class="sale-agg">Aggregator: ' + aggName + '</div>' +
        '<div class="sale-time">Submitted ' + submitted + '</div>' +
        '<div class="sale-status-row">' +
          badgeHtml +
          (totalGhs ? '<span class="sale-total">' + totalGhs + '</span>' : '') +
        '</div>' +
        extraHtml +
      '</div>';
    }

    function timeAgo(iso) {
      if (!iso) return '—';
      var diff = Date.now() - new Date(iso).getTime();
      var mins = Math.floor(diff / 60000);
      if (mins < 1)  return 'just now';
      if (mins < 60) return mins + 'm ago';
      var hrs = Math.floor(mins / 60);
      if (hrs < 24)  return hrs + 'h ago';
      return Math.floor(hrs / 24) + 'd ago';
    }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    /* ── RESET (log another) ─────────────────────── */
    function resetForm() {
      document.getElementById('materialSelect').value = '';
      document.getElementById('weightInput').value   = '';
      document.getElementById('priceInput').value    = '';
      document.getElementById('aggregatorSelect').value = '';
      document.getElementById('successState').classList.remove('visible');
      document.getElementById('formBody').style.display = 'block';
      var btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.textContent = 'Log Sale';
      hideError();
    }

    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }
  </script>

</body>
</html>
