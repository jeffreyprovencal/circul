<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log a Sale — Circul</title>
<link rel="stylesheet" href="/shared.css">
<style>
/* ── COLLECT PAGE ── */
.collect-nav{display:flex;align-items:center;gap:16px;padding:12px 24px;background:var(--nav-bg);border-bottom:1px solid var(--border-nav)}
.collect-nav .nav-logo{flex-shrink:0}
.collect-back{font-size:0.85rem;color:var(--text-2)}
.collect-back:hover{color:var(--text-1)}
.collect-page-title{font-size:0.9rem;font-weight:700;margin-left:auto}
.collect-user{font-size:0.85rem;color:var(--text-2);margin-left:16px}
.collect-form{max-width:600px;margin:0 auto}
.sale-card{background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-bottom:10px}
.sale-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sale-material{font-weight:700;font-size:0.85rem}
.sale-weight{font-size:0.85rem;color:var(--text-2)}
.sale-detail{font-size:0.75rem;color:var(--text-3);margin-bottom:4px}
.sale-status{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.sale-amount{color:var(--accent);font-weight:700;font-size:0.9rem}
.sale-note{font-size:0.7rem;color:var(--text-3);font-style:italic}

/* ── Error msg ── */
.error-msg{display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:var(--r-sm);padding:10px 14px;font-size:0.8rem;color:#f87171;margin-bottom:16px}
.error-msg.visible{display:block}

/* ── Loading state ── */
.loading-state{text-align:center;padding:32px 20px;color:var(--text-3);font-size:0.85rem}

/* ── Success state ── */
.success-state{text-align:center;padding:32px 20px;display:none}
.success-state.visible{display:block}
.success-icon{font-size:2rem;margin-bottom:12px}
.success-title{font-size:1.1rem;font-weight:700;color:var(--accent);margin-bottom:6px}
.success-sub{font-size:0.85rem;color:var(--text-2);margin-bottom:20px;line-height:1.5}
.btn-log-another{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--accent);color:#000;border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:0.85rem;font-weight:700;cursor:pointer;margin-right:10px}
.btn-log-another:hover{background:var(--accent-hover)}
.btn-back-dash{color:var(--accent);font-weight:600;font-size:0.85rem}

/* ── Sales list ── */
.sales-empty{text-align:center;padding:20px;color:var(--text-3);font-size:0.85rem}

/* ── Badge overrides for sale items ── */
.badge-pending{background:rgba(255,152,0,0.15);color:#ffb74d}
.badge-confirmed,.badge-completed{background:rgba(0,230,118,0.15);color:#00e676}
.badge-rejected{background:rgba(239,68,68,0.15);color:#f87171}
.badge-cancelled{background:rgba(122,154,122,0.15);color:var(--text-3)}
.badge-grade-a{background:rgba(0,230,118,0.15);color:#00e676}
.badge-grade-b{background:rgba(66,165,245,0.15);color:#42a5f5}
.badge-grade-c{background:rgba(255,215,64,0.15);color:#ffd740}

.sale-final-price{font-size:0.75rem;color:var(--accent);font-weight:600;margin-top:5px}
.sale-final-note{font-size:0.7rem;color:var(--text-3);margin-top:2px}
.sale-reject-reason{font-size:0.75rem;color:#f87171;margin-top:5px;line-height:1.4}

@media(max-width:768px){
  .collect-nav{flex-wrap:wrap;gap:10px;padding:10px 16px}
  .collect-page-title{margin-left:0;order:10;width:100%}
  .collect-user{display:none}
}
</style>
</head>
<body>

<div class="collect-nav">
  <a class="nav-logo" href="/"><div class="nav-logo-icon">◎</div> Circul</a>
  <a class="collect-back" href="/collector-dashboard">← Dashboard</a>
  <span class="collect-page-title">Log a Sale</span>
  <span class="collect-user" id="collectorSub">Loading…</span>
</div>

<div class="page">
  <div class="collect-form">

    <!-- LOG A SALE FORM -->
    <div class="section">
      <!-- Loading -->
      <div class="loading-state" id="loadingState">Loading your account…</div>

      <!-- Form -->
      <div id="formBody" class="hidden">
        <div class="section-title">Log a new sale</div>
        <div class="section-sub" style="margin-bottom:16px">Record a material drop-off to an aggregator</div>
        <div class="error-msg" id="errorMsg"></div>
        <div class="form-grid" style="grid-template-columns:1fr">
          <div class="form-group">
            <label class="form-label" for="materialSelect">Material type</label>
            <select class="form-select" id="materialSelect">
              <option value="">Select material…</option>
              <option value="PET">PET Plastic</option>
              <option value="HDPE">HDPE Plastic</option>
              <option value="LDPE">LDPE Plastic</option>
              <option value="PP">PP Plastic</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="weightInput">Weight (kg)</label>
            <input type="number" class="form-input" id="weightInput"
                   placeholder="0.0" min="0.1" max="500" step="0.1" inputmode="decimal">
          </div>
          <div class="form-group">
            <label class="form-label" for="aggregatorSelect">Aggregator</label>
            <select class="form-select" id="aggregatorSelect">
              <option value="">Loading aggregators…</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="priceInput">
              Price (GH₵/kg) <span style="font-weight:400;color:var(--text-3);text-transform:none;letter-spacing:0">(optional — leave blank to use posted price)</span>
            </label>
            <input type="number" class="form-input" id="priceInput"
                   placeholder="Leave blank to use posted price" min="0" step="0.01" inputmode="decimal">
          </div>
        </div>
        <button class="form-submit" id="submitBtn" onclick="submitSale()">Log Sale</button>
      </div>

      <!-- Success -->
      <div class="success-state" id="successState">
        <div class="success-icon">✅</div>
        <div class="success-title">Sale logged ✓</div>
        <div class="success-sub" id="successSub">Sale logged — waiting for aggregator to confirm.</div>
        <div>
          <button class="btn-log-another" onclick="resetForm()">+ Log another</button>
          <a href="/collector-dashboard" class="btn-back-dash">← Back to dashboard</a>
        </div>
      </div>
    </div>

    <!-- MY SALES -->
    <div class="section hidden" id="mySalesCard">
      <div class="section-head">
        <div>
          <div class="section-title">My sales</div>
          <div class="section-sub">Your recent drop-offs</div>
        </div>
        <button class="btn" onclick="loadMySales()">↻ Refresh</button>
      </div>
      <div id="mySalesList">
        <div class="sales-empty">Loading…</div>
      </div>
    </div>

    <!-- Back link -->
    <div style="text-align:center;margin-top:16px">
      <a href="/collector-dashboard" style="color:var(--accent);font-weight:600;font-size:0.85rem">← Back to dashboard</a>
    </div>

  </div>
</div>

<script>
    var session     = null;
    var collectorId = null; // resolved collectors.id

    /* ── AUTH GATE ─────────────────────────────── */
    (function () {
      try { session = JSON.parse(localStorage.getItem('circul_user')); } catch (e) {}
      if (!session || session.role !== 'collector') {
        window.location.replace('/login.html');
        return;
      }
      document.getElementById('collectorSub').textContent = session.name || session.phone || '';
      resolveCollectorId();
    })();

    /* ── RESOLVE COLLECTOR ID ───────────────────── */
    function resolveCollectorId() {
      if (!session || !session.phone) {
        document.getElementById('loadingState').textContent =
          'Could not identify your account. Please sign in again.';
        return;
      }

      fetch('/api/collectors?phone=' + encodeURIComponent(session.phone))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var row = data && data.collectors && data.collectors[0];
          if (!row) {
            document.getElementById('loadingState').textContent =
              'No collector record found for this account. Please contact support.';
            return;
          }
          collectorId = row.id;
          document.getElementById('loadingState').classList.add('hidden');
          document.getElementById('formBody').classList.remove('hidden');
          loadAggregators();
          loadMySales();
        })
        .catch(function () {
          document.getElementById('loadingState').textContent =
            'Failed to load account. Check your connection and refresh.';
        });
    }

    /* ── LOAD AGGREGATORS ───────────────────────── */
    function loadAggregators() {
      fetch('/api/aggregators')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var sel = document.getElementById('aggregatorSelect');
          var aggs = data.aggregators || [];
          if (!aggs.length) {
            sel.innerHTML = '<option value="">No aggregators available</option>';
            return;
          }
          sel.innerHTML = '<option value="">Select aggregator…</option>' +
            aggs.map(function (a) {
              var label = (a.name || a.company || ('AGG-' + String(a.id).padStart(4, '0')));
              if (a.city) label += ' — ' + a.city;
              return '<option value="' + a.id + '">' + label + '</option>';
            }).join('');
          var preselect = sessionStorage.getItem('preselectAggregatorId');
          if (preselect) {
            sel.value = preselect;
            sessionStorage.removeItem('preselectAggregatorId');
          }
          // Pre-select aggregator if ?agg= param is present
          var params = new URLSearchParams(window.location.search);
          var aggParam = params.get('agg');
          if (aggParam) {
            sel.value = aggParam;
          }
        })
        .catch(function () {
          document.getElementById('aggregatorSelect').innerHTML =
            '<option value="">Failed to load aggregators</option>';
        });
    }

    /* ── SUBMIT SALE ────────────────────────────── */
    function submitSale() {
      var material  = document.getElementById('materialSelect').value;
      var weight    = parseFloat(document.getElementById('weightInput').value);
      var aggId     = parseInt(document.getElementById('aggregatorSelect').value, 10);
      var priceVal  = document.getElementById('priceInput').value.trim();
      var price     = priceVal !== '' ? parseFloat(priceVal) : null;

      if (!material)           { showError('Please select a material type.'); return; }
      if (!weight || weight <= 0) { showError('Please enter a valid weight greater than 0 kg.'); return; }
      if (weight > 500)        { showError('Maximum weight per sale is 500 kg.'); return; }
      if (!aggId)              { showError('Please select an aggregator.'); return; }
      if (!collectorId)        { showError('Account not ready — please wait or refresh.'); return; }

      hideError();
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Logging…';

      var payload = {
        transaction_type:       'collector_sale',
        collector_id:           collectorId,
        aggregator_id: aggId,
        material_type:          material,
        gross_weight_kg:        weight
      };
      if (price !== null && !isNaN(price)) payload.price_per_kg = price;

      fetch('/api/pending-transactions', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.success) {
            var pt = data.pending_transaction;
            var kg = parseFloat(pt.gross_weight_kg).toFixed(1);
            document.getElementById('successSub').textContent =
              kg + ' kg of ' + pt.material_type + ' logged — waiting for aggregator to confirm.';
            document.getElementById('formBody').classList.add('hidden');
            document.getElementById('successState').classList.add('visible');
            loadMySales();
          } else {
            showError(data.message || 'Failed to log sale. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Log Sale';
          }
        })
        .catch(function () {
          showError('Connection error. Please check your internet and try again.');
          btn.disabled = false;
          btn.textContent = 'Log Sale';
        });
    }

    /* ── LOAD MY SALES ───────────────────────────── */
    function loadMySales() {
      if (!collectorId) return;
      var card = document.getElementById('mySalesCard');
      var list = document.getElementById('mySalesList');

      var _token = localStorage.getItem('circul_token') || '';
      fetch('/api/pending-transactions/collector-sales?collector_id=' + collectorId, {
        headers: _token ? { 'Authorization': 'Bearer ' + _token } : {}
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var rows = data.pending_transactions || [];
          card.classList.remove('hidden');
          if (!rows.length) {
            list.innerHTML = '<div class="sales-empty">No sales logged yet.</div>';
            return;
          }
          list.innerHTML = rows.map(renderSaleItem).join('');
        })
        .catch(function () {
          card.classList.remove('hidden');
          list.innerHTML = '<div class="sales-empty">Could not load sales.</div>';
        });
    }

    function renderSaleItem(pt) {
      var status    = pt.status || 'pending';
      var kg        = parseFloat(pt.gross_weight_kg);
      var aggName   = esc(pt.aggregator_name || pt.aggregator_company || '—');
      var priceAsk  = pt.price_per_kg ? 'GH₵ ' + parseFloat(pt.price_per_kg).toFixed(2) + '/kg' : 'Price TBD';
      var submitted = timeAgo(pt.created_at);

      // Status badge + label
      var badgeHtml, extraHtml = '';
      if (status === 'pending') {
        badgeHtml = '<span class="badge badge-pending">Awaiting Aggregator</span>';
      } else if (status === 'confirmed') {
        badgeHtml = '<span class="badge badge-confirmed">Accepted</span>';
        // Grade badge
        var grade = pt.grade || '';
        if (grade) {
          var gradeClass = grade === 'A' ? 'badge-grade-a' : grade === 'B' ? 'badge-grade-b' : 'badge-grade-c';
          badgeHtml += ' <span class="badge ' + gradeClass + '">Grade ' + esc(grade) + '</span>';
        }
        // Final price from transaction JOIN
        var finalPrice  = parseFloat(pt.final_price_per_kg || pt.price_per_kg || 0);
        var finalTotal  = parseFloat(pt.final_total_price  || (finalPrice * kg) || 0);
        var priceNote   = grade === 'A' ? '<div class="sale-final-note">(+10% premium applied)</div>' : '';
        extraHtml = '<div class="sale-final-price">Final price: GH₵ ' + finalPrice.toFixed(2) + ' × ' + kg.toFixed(1) + ' kg = GH₵ ' + finalTotal.toFixed(2) + '</div>' + priceNote;
      } else if (status === 'rejected') {
        badgeHtml = '<span class="badge badge-rejected">Rejected</span>';
        if (pt.rejection_reason) {
          extraHtml = '<div class="sale-reject-reason">✗ ' + esc(pt.rejection_reason) + '</div>';
        }
      } else if (status === 'completed') {
        badgeHtml = '<span class="badge badge-completed">Completed</span>';
      } else {
        badgeHtml = '<span class="badge badge-pending">' + esc(status) + '</span>';
      }

      // Total line: use final if confirmed, else original or TBD
      var totalGhs = '';
      if (status === 'confirmed' && pt.final_total_price) {
        totalGhs = 'GH₵ ' + parseFloat(pt.final_total_price).toFixed(2);
      } else if (pt.total_price) {
        totalGhs = 'GH₵ ' + parseFloat(pt.total_price).toFixed(2);
      } else if (pt.price_per_kg) {
        totalGhs = 'GH₵ ' + (parseFloat(pt.price_per_kg) * kg).toFixed(2);
      }

      return '<div class="sale-card">' +
        '<div class="sale-header">' +
          '<span class="sale-material"><span class="pill pill-' + esc(pt.material_type).toLowerCase() + '">' + esc(pt.material_type) + '</span></span>' +
          '<span class="sale-weight">' + kg.toFixed(1) + ' kg</span>' +
        '</div>' +
        '<div class="sale-detail">' + priceAsk + ' · Aggregator: ' + aggName + '</div>' +
        '<div class="sale-detail">Submitted ' + submitted + '</div>' +
        '<div class="sale-status">' +
          badgeHtml +
          (totalGhs ? '<span class="sale-amount">' + totalGhs + '</span>' : '') +
        '</div>' +
        (extraHtml ? '<div class="sale-note">' + extraHtml + '</div>' : '') +
      '</div>';
    }

    function timeAgo(iso) {
      if (!iso) return '—';
      var diff = Date.now() - new Date(iso).getTime();
      var mins = Math.floor(diff / 60000);
      if (mins < 1)  return 'just now';
      if (mins < 60) return mins + 'm ago';
      var hrs = Math.floor(mins / 60);
      if (hrs < 24)  return hrs + 'h ago';
      return Math.floor(hrs / 24) + 'd ago';
    }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    /* ── RESET (log another) ─────────────────────── */
    function resetForm() {
      document.getElementById('materialSelect').value = '';
      document.getElementById('weightInput').value   = '';
      document.getElementById('priceInput').value    = '';
      document.getElementById('aggregatorSelect').value = '';
      document.getElementById('successState').classList.remove('visible');
      document.getElementById('formBody').classList.remove('hidden');
      var btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.textContent = 'Log Sale';
      hideError();
    }

    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }
</script>

</body>
</html>
