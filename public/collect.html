<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log a Sale — Circul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep:       #1a2e1a;
      --forest:     #2d6a4f;
      --mint:       #a7f3d0;
      --light-mint: #f0fdf4;
      --white:      #ffffff;
      --bg:         #f3f6f3;
      --text:       #1a2e1a;
      --muted:      #6b7280;
      --border:     #e5e7eb;
      --radius:     16px;
      --radius-sm:  10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; }

    /* ── HEADER ── */
    .header { background: var(--deep); }

    .header-inner {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 24px 28px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .brand {
      font-size: 1rem;
      font-weight: 800;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .header-back {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.15s;
    }
    .header-back:hover { color: var(--white); }

    .header-title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.8px;
      line-height: 1.1;
    }

    .header-sub {
      font-size: 0.86rem;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
    }

    /* ── MAIN ── */
    .main {
      max-width: 640px;
      margin: 0 auto;
      padding: 28px 24px 64px;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .form-card-body { padding: 28px 24px; }

    /* ── FORM ── */
    .form-group { margin-bottom: 22px; }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-label .optional {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.78rem;
    }

    .form-select,
    .form-input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.15s;
      outline: none;
      -webkit-appearance: none;
    }
    .form-select:focus,
    .form-input:focus { border-color: var(--forest); box-shadow: 0 0 0 3px rgba(45,106,79,0.08); }

    /* ── SUBMIT ── */
    .btn-submit {
      width: 100%;
      padding: 15px 28px;
      background: var(--mint);
      color: var(--deep);
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-submit:hover:not(:disabled) { background: #86efcc; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── ERROR ── */
    .error-msg {
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-sm);
      color: #dc2626;
      font-size: 0.875rem;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── LOADING ── */
    .loading-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── SUCCESS ── */
    .success-state {
      text-align: center;
      padding: 48px 24px;
      display: none;
    }
    .success-state.visible { display: block; }

    .success-icon { font-size: 2.8rem; margin-bottom: 16px; }

    .success-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--deep);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 24px;
      background: transparent;
      border: 1.5px solid var(--forest);
      color: var(--forest);
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      transition: background 0.15s, color 0.15s;
    }
    .btn-back:hover { background: var(--forest); color: var(--white); }

    .btn-log-another {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: var(--mint);
      color: var(--deep);
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      margin-right: 12px;
      margin-bottom: 12px;
      transition: background 0.15s;
    }
    .btn-log-another:hover { background: #86efcc; }

    /* ── PENDING CARD ── */
    .pending-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .pending-card-header {
      padding: 16px 24px;
      background: var(--deep);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--mint);
      letter-spacing: 0.3px;
    }

    .pending-card-body { padding: 0; }

    .pending-empty {
      padding: 28px 24px;
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .pending-row {
      display: grid;
      grid-template-columns: 80px 60px 70px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .pending-row:last-child { border-bottom: none; }

    .pending-row-date  { color: var(--muted); font-size: 0.78rem; }
    .pending-row-mat   { font-weight: 700; color: var(--forest); }
    .pending-row-kg    { color: var(--text); }
    .pending-row-agg   { color: var(--muted); font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .badge-pending   { background: #fef9c3; color: #854d0e; }
    .badge-confirmed { background: #dcfce7; color: #166534; }
    .badge-rejected  { background: #fee2e2; color: #991b1b; }
    .badge-cancelled { background: #f3f4f6; color: #4b5563; }

    @media (max-width: 480px) {
      .header-inner { padding: 18px 16px 24px; }
      .main         { padding: 20px 16px 52px; }
      .pending-row  { grid-template-columns: 70px 52px 60px 1fr auto; gap: 8px; padding: 12px 16px; }
      .form-card-body { padding: 24px 16px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-top">
        <a href="/" class="brand">♻ Circul</a>
        <a href="/collector-dashboard" class="header-back">← Dashboard</a>
      </div>
      <div class="header-title">Log a Sale</div>
      <div class="header-sub" id="collectorSub">Loading…</div>
    </div>
  </header>

  <main class="main">

    <!-- ── FORM CARD ── -->
    <div class="form-card">

      <!-- Loading -->
      <div class="loading-state" id="loadingState">Loading your account…</div>

      <!-- Form -->
      <div class="form-card-body" id="formBody" style="display:none">
        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
          <label class="form-label" for="materialSelect">Material type</label>
          <select class="form-select" id="materialSelect">
            <option value="">Select material…</option>
            <option value="PET">PET Plastic</option>
            <option value="HDPE">HDPE Plastic</option>
            <option value="LDPE">LDPE Plastic</option>
            <option value="PP">PP Plastic</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="weightInput">Weight (kg)</label>
          <input type="number" class="form-input" id="weightInput"
                 placeholder="0.0" min="0.1" max="100" step="0.1" inputmode="decimal">
        </div>

        <div class="form-group">
          <label class="form-label" for="aggregatorSelect">Aggregator</label>
          <select class="form-select" id="aggregatorSelect">
            <option value="">Loading aggregators…</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="priceInput">
            Price (GH₵/kg) <span class="optional">(optional — leave blank to use posted price)</span>
          </label>
          <input type="number" class="form-input" id="priceInput"
                 placeholder="Leave blank to use posted price" min="0" step="0.01" inputmode="decimal">
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submitSale()">
          Log Sale
        </button>
      </div>

      <!-- Success -->
      <div class="success-state" id="successState">
        <div class="success-icon">✅</div>
        <div class="success-title">Sale logged ✓</div>
        <div class="success-sub" id="successSub">Sale logged — waiting for aggregator to confirm.</div>
        <div>
          <button class="btn-log-another" onclick="resetForm()">+ Log another</button>
          <a href="/collector-dashboard" class="btn-back">← Back to dashboard</a>
        </div>
      </div>

    </div>

    <!-- ── PENDING SALES ── -->
    <div class="pending-card" id="pendingCard" style="display:none">
      <div class="pending-card-header">⏳ Pending Sales</div>
      <div class="pending-card-body" id="pendingList">
        <div class="pending-empty">Loading…</div>
      </div>
    </div>

  </main>

  <script>
    var session     = null;
    var collectorId = null; // resolved collectors.id

    /* ── AUTH GATE ─────────────────────────────── */
    (function () {
      try { session = JSON.parse(localStorage.getItem('circul_operator')); } catch (e) {}
      if (!session || session.role !== 'collector') {
        window.location.replace('/login.html');
        return;
      }
      document.getElementById('collectorSub').textContent = session.name || session.phone || '';
      resolveCollectorId();
    })();

    /* ── RESOLVE COLLECTOR ID ───────────────────── */
    function resolveCollectorId() {
      if (!session || !session.phone) {
        document.getElementById('loadingState').textContent =
          'Could not identify your account. Please sign in again.';
        return;
      }

      fetch('/api/collectors?phone=' + encodeURIComponent(session.phone))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var row = data && data.collectors && data.collectors[0];
          if (!row) {
            document.getElementById('loadingState').textContent =
              'No collector record found for this account. Please contact support.';
            return;
          }
          collectorId = row.id;
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('formBody').style.display = 'block';
          loadAggregators();
          loadPendingSales();
        })
        .catch(function () {
          document.getElementById('loadingState').textContent =
            'Failed to load account. Check your connection and refresh.';
        });
    }

    /* ── LOAD AGGREGATORS ───────────────────────── */
    function loadAggregators() {
      fetch('/api/operators?role=aggregator')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var sel = document.getElementById('aggregatorSelect');
          var aggs = data.operators || [];
          if (!aggs.length) {
            sel.innerHTML = '<option value="">No aggregators available</option>';
            return;
          }
          sel.innerHTML = '<option value="">Select aggregator…</option>' +
            aggs.map(function (a) {
              var label = a.name || a.company || ('Aggregator #' + a.id);
              if (a.city) label += ' — ' + a.city;
              return '<option value="' + a.id + '">' + label + '</option>';
            }).join('');
        })
        .catch(function () {
          document.getElementById('aggregatorSelect').innerHTML =
            '<option value="">Failed to load aggregators</option>';
        });
    }

    /* ── SUBMIT SALE ────────────────────────────── */
    function submitSale() {
      var material  = document.getElementById('materialSelect').value;
      var weight    = parseFloat(document.getElementById('weightInput').value);
      var aggId     = parseInt(document.getElementById('aggregatorSelect').value, 10);
      var priceVal  = document.getElementById('priceInput').value.trim();
      var price     = priceVal !== '' ? parseFloat(priceVal) : null;

      if (!material)           { showError('Please select a material type.'); return; }
      if (!weight || weight <= 0) { showError('Please enter a valid weight greater than 0 kg.'); return; }
      if (weight > 100)        { showError('Maximum weight per sale is 100 kg.'); return; }
      if (!aggId)              { showError('Please select an aggregator.'); return; }
      if (!collectorId)        { showError('Account not ready — please wait or refresh.'); return; }

      hideError();
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Logging…';

      var payload = {
        transaction_type:       'collector_sale',
        collector_id:           collectorId,
        aggregator_operator_id: aggId,
        material_type:          material,
        gross_weight_kg:        weight
      };
      if (price !== null && !isNaN(price)) payload.price_per_kg = price;

      fetch('/api/pending-transactions', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.success) {
            var pt = data.pending_transaction;
            var kg = parseFloat(pt.gross_weight_kg).toFixed(1);
            document.getElementById('successSub').textContent =
              kg + ' kg of ' + pt.material_type + ' logged — waiting for aggregator to confirm.';
            document.getElementById('formBody').style.display = 'none';
            document.getElementById('successState').classList.add('visible');
            loadPendingSales();
          } else {
            showError(data.message || 'Failed to log sale. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Log Sale';
          }
        })
        .catch(function () {
          showError('Connection error. Please check your internet and try again.');
          btn.disabled = false;
          btn.textContent = 'Log Sale';
        });
    }

    /* ── LOAD PENDING SALES ─────────────────────── */
    function loadPendingSales() {
      if (!collectorId) return;
      var card = document.getElementById('pendingCard');
      var list = document.getElementById('pendingList');

      fetch('/api/pending-transactions?collector_id=' + collectorId)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var rows = data.pending_transactions || [];
          card.style.display = '';
          if (!rows.length) {
            list.innerHTML = '<div class="pending-empty">No pending sales — all confirmed or none logged yet.</div>';
            return;
          }
          list.innerHTML = rows.map(function (pt) {
            var date = new Date(pt.created_at).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
            var kg   = parseFloat(pt.gross_weight_kg).toFixed(1) + ' kg';
            var agg  = pt.aggregator_name || '—';
            var badgeClass = 'badge-' + (pt.status || 'pending');
            return '<div class="pending-row">' +
              '<span class="pending-row-date">'  + date + '</span>' +
              '<span class="pending-row-mat">'   + pt.material_type + '</span>' +
              '<span class="pending-row-kg">'    + kg + '</span>' +
              '<span class="pending-row-agg">'   + agg + '</span>' +
              '<span class="badge ' + badgeClass + '">' + (pt.status || 'pending') + '</span>' +
            '</div>';
          }).join('');
        })
        .catch(function () {
          card.style.display = '';
          list.innerHTML = '<div class="pending-empty">Could not load pending sales.</div>';
        });
    }

    /* ── RESET (log another) ─────────────────────── */
    function resetForm() {
      document.getElementById('materialSelect').value = '';
      document.getElementById('weightInput').value   = '';
      document.getElementById('priceInput').value    = '';
      document.getElementById('aggregatorSelect').value = '';
      document.getElementById('successState').classList.remove('visible');
      document.getElementById('formBody').style.display = 'block';
      var btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.textContent = 'Log Sale';
      hideError();
    }

    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }
  </script>

</body>
</html>
