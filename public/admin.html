<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Circul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared.css">
<style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;}
    body{
      font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#0a1a0f;color:#e8f5e9;min-height:100vh;
      display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;
    }
    *{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
    a{text-decoration:none;}

    /* NAV */
    .nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 60px;height:64px;
      background:rgba(10,26,15,0.95);backdrop-filter:blur(12px);
      border-bottom:1px solid #1a2e1a;position:sticky;top:0;z-index:100;
    }
    .nav-left{display:flex;align-items:center;gap:16px;}
    .nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;color:#e8f5e9;}
    .nav-logo-icon{width:30px;height:30px;background:#00e676;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:#000;font-weight:900;}
    .nav-admin-badge{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#4a6a4a;border:1px solid #1a3a1a;padding:3px 10px;border-radius:4px;}
    .nav-hint{font-size:12px;color:#2a4a2a;}

    /* CONTENT */
    .content{flex:1;max-width:1000px;margin:0 auto;width:100%;padding:40px 24px 80px;}

    /* HEADING */
    .page-heading{font-size:22px;font-weight:800;color:#e8f5e9;margin-bottom:6px;}
    .page-sub{font-size:14px;color:#4a6a4a;margin-bottom:32px;}

    /* TABLE WRAPPER */
    .table-wrap{border:1px solid #1a3a1a;border-radius:12px;overflow:hidden;margin-bottom:32px;}
    table{width:100%;border-collapse:collapse;}
    th{
      padding:12px 16px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      color:#4a6a4a;background:#0c1e0e;text-align:left;border-bottom:1px solid #1a3a1a;
    }
    td{padding:14px 16px;font-size:14px;color:#e8f5e9;border-bottom:1px solid #0f2814;vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr.rejected{opacity:.3;transition:opacity .4s;}

    /* Role chips */
    .chip{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:4px;}
    .chip-processor{background:rgba(0,230,118,.12);color:#00e676;}
    .chip-converter{background:rgba(168,85,247,.12);color:#a855f7;}

    /* Actions */
    .actions{display:flex;gap:8px;align-items:center;}
    .btn-approve{
      padding:6px 14px;background:#00e676;color:#0a1a0f;
      border:none;border-radius:6px;font-size:12px;font-weight:700;
      cursor:pointer;transition:background .15s;white-space:nowrap;
    }
    .btn-approve:hover{background:#33eb8e;}
    .btn-approve.done{background:#0f2a14;color:#00e676;cursor:default;pointer-events:none;}
    .btn-reject{
      padding:6px 10px;background:transparent;color:#4a6a4a;
      border:1px solid #1a3a1a;border-radius:6px;font-size:12px;font-weight:700;
      cursor:pointer;transition:all .15s;
    }
    .btn-reject:hover{border-color:#ef4444;color:#f87171;}
    .btn-reject.hidden{display:none;}

    /* Name+company cell */
    .cell-name{font-weight:600;color:#e8f5e9;}
    .cell-company{font-size:12px;color:#4a6a4a;margin-top:2px;}

    /* Empty state */
    .empty-state{
      text-align:center;padding:60px 20px;
    }
    .empty-state-icon{font-size:32px;margin-bottom:12px;opacity:.3;}
    .empty-state p{font-size:14px;color:#4a6a4a;}

    /* STATS STRIP */
    .stats-strip{display:flex;gap:12px;flex-wrap:wrap;}
    .stat-card{
      background:#0c1e0e;border:1px solid #1a3a1a;border-radius:10px;
      padding:16px 20px;flex:1;min-width:120px;
    }
    .stat-value{font-size:26px;font-weight:800;margin-bottom:4px;}
    .stat-label{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
    .stat-green{color:#00e676;}
    .stat-purple{color:#a855f7;}
    .stat-amber{color:#f59e0b;}

    /* Loading skeleton */
    .skeleton{background:#1a3a1a;border-radius:4px;animation:pulse 1.4s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

    @media(max-width:700px){
      .nav{padding:0 16px;}
      .content{padding:24px 16px 60px;}
      .table-wrap{border-radius:8px;}
      th,td{padding:10px 12px;}
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-left">
      <a href="/" class="nav-logo">
        <div class="nav-logo-icon">◎</div>
        circul
      </a>
      <span class="nav-admin-badge">Admin</span>
    </div>
    <span class="nav-hint">Hidden · /admin</span>
  </nav>

  <!-- CONTENT -->
  <div class="content">
    <h1 class="page-heading">Pending Access Requests</h1>
    <p class="page-sub">Approve or reject processor and converter access requests.</p>

    <!-- TABLE -->
    <div class="table-wrap">
      <table id="pending-table">
        <thead>
          <tr>
            <th>Name &amp; Company</th>
            <th>Email</th>
            <th>Role</th>
            <th>Requested</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="pending-body">
          <tr><td colspan="5"><div style="height:20px;margin:8px 0;" class="skeleton"></div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- STATS STRIP -->
    <div class="stats-strip" id="stats-strip">
      <div class="stat-card"><div class="stat-value stat-green skeleton" style="width:40px;height:32px;"></div><div class="stat-label" style="margin-top:4px;">Loading…</div></div>
    </div>
  </div>

  <script>
    /* ── Relative time ─────────────────── */
    function relTime(dateStr) {
      var diff = (Date.now() - new Date(dateStr)) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      return Math.floor(diff/86400) + 'd ago';
    }

    /* ── Render pending table ──────────── */
    function renderPending(rows) {
      var tbody = document.getElementById('pending-body');
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">✓</div><p>No pending requests.</p></div></td></tr>';
        return;
      }
      tbody.innerHTML = '';
      rows.forEach(function(row) {
        var tr = document.createElement('tr');
        tr.id = 'row-' + row.role + '-' + row.id;
        var roleChip = row.role === 'processor'
          ? '<span class="chip chip-processor">Processor</span>'
          : '<span class="chip chip-converter">Converter</span>';
        tr.innerHTML = [
          '<td><div class="cell-name">' + esc(row.name) + '</div><div class="cell-company">' + esc(row.company||'') + '</div></td>',
          '<td>' + esc(row.email||'') + '</td>',
          '<td>' + roleChip + '</td>',
          '<td>' + relTime(row.created_at) + '</td>',
          '<td class="actions">',
            '<button class="btn-approve" id="approve-' + row.role + '-' + row.id + '" onclick="approve(' + row.id + ',\'' + row.role + '\')">Approve</button>',
            '<button class="btn-reject" id="reject-' + row.role + '-' + row.id + '" onclick="reject(' + row.id + ',\'' + row.role + '\')">✕</button>',
          '</td>'
        ].join('');
        tbody.appendChild(tr);
      });
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Approve ───────────────────────── */
    function approve(id, role) {
      fetch('/api/admin/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id, role: role })
      })
        .then(function(r){ return r.json(); })
        .then(function(data){
          if (data.ok) {
            var approveBtn = document.getElementById('approve-' + role + '-' + id);
            var rejectBtn = document.getElementById('reject-' + role + '-' + id);
            if (approveBtn) { approveBtn.textContent = '✓ Approved'; approveBtn.classList.add('done'); }
            if (rejectBtn) { rejectBtn.classList.add('hidden'); }
          }
        })
        .catch(function(){ alert('Failed to approve. Please try again.'); });
    }

    /* ── Reject ────────────────────────── */
    function reject(id, role) {
      if (!confirm('Remove this access request?')) return;
      fetch('/api/admin/reject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id, role: role })
      })
        .then(function(r){ return r.json(); })
        .then(function(data){
          if (data.ok) {
            var tr = document.getElementById('row-' + role + '-' + id);
            if (tr) tr.classList.add('rejected');
          }
        })
        .catch(function(){ alert('Failed to reject. Please try again.'); });
    }

    /* ── Render stats ──────────────────── */
    function renderStats(stats) {
      var strip = document.getElementById('stats-strip');
      strip.innerHTML = [
        '<div class="stat-card"><div class="stat-value stat-green">' + (stats.collectors||0) + '</div><div class="stat-label" style="color:#4a6a4a;">Collectors</div></div>',
        '<div class="stat-card"><div class="stat-value stat-green">' + (stats.aggregators||0) + '</div><div class="stat-label" style="color:#4a6a4a;">Aggregators</div></div>',
        '<div class="stat-card"><div class="stat-value stat-green">' + (stats.processors||0) + '</div><div class="stat-label" style="color:#4a6a4a;">Processors</div></div>',
        '<div class="stat-card"><div class="stat-value stat-purple">' + (stats.converters||0) + '</div><div class="stat-label" style="color:#4a6a4a;">Converters</div></div>',
        '<div class="stat-card"><div class="stat-value stat-amber">' + (stats.pending||0) + '</div><div class="stat-label" style="color:#4a6a4a;">Pending</div></div>'
      ].join('');
    }

    /* ── Load data ─────────────────────── */
    fetch('/api/admin/pending')
      .then(function(r){ return r.json(); })
      .then(function(rows){ renderPending(rows); })
      .catch(function(){ document.getElementById('pending-body').innerHTML = '<tr><td colspan="5" style="color:#f87171;padding:20px;">Failed to load pending requests.</td></tr>'; });

    fetch('/api/admin/stats')
      .then(function(r){ return r.json(); })
      .then(function(data){ renderStats(data); })
      .catch(function(){ document.getElementById('stats-strip').innerHTML = '<p style="color:#4a6a4a;font-size:13px;">Stats unavailable.</p>'; });
  </script>

</body>
</html>
