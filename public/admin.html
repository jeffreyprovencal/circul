<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Circul</title>
<link rel="stylesheet" href="/shared.css">
<style>
/* ── ADMIN PAGE ── */
.user-avatar{width:28px;height:28px;background:var(--accent-muted);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;color:var(--accent)}
.role-filter{display:flex;gap:6px;flex-wrap:wrap}

/* ── Role chips ── */
.chip{display:inline-block;font-size:0.7rem;font-weight:600;padding:3px 8px;border-radius:10px;white-space:nowrap}
.chip-processor{background:rgba(66,165,245,0.15);color:#42a5f5}
.chip-converter{background:rgba(244,143,177,0.15);color:#f48fb1}

/* ── Actions ── */
.actions{display:flex;gap:8px;align-items:center}
.btn-approve{padding:6px 14px;background:var(--accent);color:#000;border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:0.75rem;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-approve:hover{background:var(--accent-hover)}
.btn-approve.done{background:var(--accent-muted);color:var(--accent);cursor:default;pointer-events:none}
.btn-reject{padding:6px 10px;background:transparent;color:var(--text-3);border:1px solid var(--border);border-radius:var(--r-sm);font-family:var(--font);font-size:0.75rem;font-weight:700;cursor:pointer}
.btn-reject:hover{border-color:#ef4444;color:#f87171}
.btn-reject.hidden{display:none}

/* ── Name+company cell ── */
.cell-name{font-weight:600}
.cell-company{font-size:0.7rem;color:var(--text-3);margin-top:2px}

/* ── Rejected row ── */
tr.rejected{opacity:0.3;transition:opacity 0.4s}

/* ── Skeleton ── */
.skeleton{background:var(--border);border-radius:4px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── Stats strip (pending / role counts) ── */
.stats-strip{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:var(--gap)}
.stats-strip .stat{flex:1;min-width:120px}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/"><div class="nav-logo-icon">◎</div> Circul</a>
  <span class="nav-spacer"></span>
  <div class="nav-right">
    <span class="nav-pill" style="background:#1a1a2e;color:#e0e0e0">ADMIN</span>
    <span class="nav-name">Admin</span>
    <a class="nav-link" href="/">Dashboard</a>
    <a class="nav-link" href="/admin.html">Users</a>
    <button class="nav-logout" onclick="window.location.href='/login.html'">Log out</button>
  </div>
</nav>

<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-info">
      <div class="hero-name">Admin dashboard</div>
      <div class="hero-meta">
        Pending access requests <span class="sep">·</span> Approve or reject processor and converter access
      </div>
    </div>
  </div>

  <!-- STATS STRIP -->
  <div class="stats-strip" id="stats-strip">
    <div class="stat"><div class="stat-val skeleton" style="width:40px;height:28px;display:inline-block"></div><div class="stat-label" style="margin-top:4px">Loading…</div></div>
  </div>

  <!-- PENDING REQUESTS TABLE -->
  <div class="section">
    <div class="section-head">
      <div>
        <div class="section-title">Pending access requests</div>
        <div class="section-sub">Users awaiting account activation</div>
      </div>
    </div>
    <div class="table-wrap">
      <table id="pending-table">
        <thead>
          <tr>
            <th>Name &amp; Company</th>
            <th>Email</th>
            <th>Role</th>
            <th>Requested</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="pending-body">
          <tr><td colspan="5"><div style="height:20px;margin:8px 0;" class="skeleton"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
    /* ── Relative time ─────────────────── */
    function relTime(dateStr) {
      var diff = (Date.now() - new Date(dateStr)) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      return Math.floor(diff/86400) + 'd ago';
    }

    /* ── Render pending table ──────────── */
    function renderPending(rows) {
      var tbody = document.getElementById('pending-body');
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty"><div class="empty-icon">✓</div>No pending requests.</div></td></tr>';
        return;
      }
      tbody.innerHTML = '';
      rows.forEach(function(row) {
        var tr = document.createElement('tr');
        tr.id = 'row-' + row.role + '-' + row.id;
        var roleChip = row.role === 'processor'
          ? '<span class="chip chip-processor">Processor</span>'
          : '<span class="chip chip-converter">Converter</span>';
        tr.innerHTML = [
          '<td><div class="cell-name">' + esc(row.name) + '</div><div class="cell-company">' + esc(row.company||'') + '</div></td>',
          '<td>' + esc(row.email||'') + '</td>',
          '<td>' + roleChip + '</td>',
          '<td>' + relTime(row.created_at) + '</td>',
          '<td class="actions">',
            '<button class="btn-approve" id="approve-' + row.role + '-' + row.id + '" onclick="approve(' + row.id + ',\'' + row.role + '\')">Approve</button>',
            '<button class="btn-reject" id="reject-' + row.role + '-' + row.id + '" onclick="reject(' + row.id + ',\'' + row.role + '\')">✕</button>',
          '</td>'
        ].join('');
        tbody.appendChild(tr);
      });
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Approve ───────────────────────── */
    function approve(id, role) {
      fetch('/api/admin/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id, role: role })
      })
        .then(function(r){ return r.json(); })
        .then(function(data){
          if (data.ok) {
            var approveBtn = document.getElementById('approve-' + role + '-' + id);
            var rejectBtn = document.getElementById('reject-' + role + '-' + id);
            if (approveBtn) { approveBtn.textContent = '✓ Approved'; approveBtn.classList.add('done'); }
            if (rejectBtn) { rejectBtn.classList.add('hidden'); }
          }
        })
        .catch(function(){ alert('Failed to approve. Please try again.'); });
    }

    /* ── Reject ────────────────────────── */
    function reject(id, role) {
      if (!confirm('Remove this access request?')) return;
      fetch('/api/admin/reject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id, role: role })
      })
        .then(function(r){ return r.json(); })
        .then(function(data){
          if (data.ok) {
            var tr = document.getElementById('row-' + role + '-' + id);
            if (tr) tr.classList.add('rejected');
          }
        })
        .catch(function(){ alert('Failed to reject. Please try again.'); });
    }

    /* ── Render stats ──────────────────── */
    function renderStats(stats) {
      var strip = document.getElementById('stats-strip');
      strip.innerHTML = [
        '<div class="stat"><div class="stat-val" style="color:#00e676">' + (stats.collectors||0) + '</div><div class="stat-label">Collectors</div></div>',
        '<div class="stat"><div class="stat-val" style="color:#26c6da">' + (stats.aggregators||0) + '</div><div class="stat-label">Aggregators</div></div>',
        '<div class="stat"><div class="stat-val" style="color:#42a5f5">' + (stats.processors||0) + '</div><div class="stat-label">Processors</div></div>',
        '<div class="stat"><div class="stat-val" style="color:#b388ff">' + (stats.converters||0) + '</div><div class="stat-label">Converters</div></div>',
        '<div class="stat"><div class="stat-val" style="color:#ffb74d">' + (stats.pending||0) + '</div><div class="stat-label">Pending</div></div>'
      ].join('');
    }

    /* ── Load data ─────────────────────── */
    fetch('/api/admin/pending')
      .then(function(r){ return r.json(); })
      .then(function(rows){ renderPending(rows); })
      .catch(function(){ document.getElementById('pending-body').innerHTML = '<tr><td colspan="5" style="color:#f87171;padding:20px;">Failed to load pending requests.</td></tr>'; });

    fetch('/api/admin/stats')
      .then(function(r){ return r.json(); })
      .then(function(data){ renderStats(data); })
      .catch(function(){ document.getElementById('stats-strip').innerHTML = '<p style="color:var(--text-3);font-size:0.8rem;">Stats unavailable.</p>'; });
</script>

</body>
</html>
